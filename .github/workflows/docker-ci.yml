name: Docker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t actions-prueba:test .

      - name: Run Docker container
        run: |
          docker run -d --name actions-prueba-test -p 8080:80 actions-prueba:test
          sleep 5
          curl --fail http://localhost:8080

      - name: Cleanup container
        if: always()
        run: |
          docker stop actions-prueba-test 2>/dev/null || true
          docker rm actions-prueba-test 2>/dev/null || true
